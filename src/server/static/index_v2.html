<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机维修语音助手 — HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style_v2.css">
</head>
<body>
    <!-- 背景装饰层 -->
    <div class="bg-grid"></div>
    <div class="bg-scanline"></div>
    <div class="bg-vignette"></div>

    <div class="brand-cluster" id="brandCluster">
        <div class="brand-badge">
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <div class="brand-text">
                <div class="brand-title">飞机维修助手</div>
            </div>
        </div>
        <button class="panel-toggle" id="panelToggle" aria-label="展开功能面板">
            <span></span><span></span><span></span>
        </button>
    </div>

    <aside class="glass-panel" id="controlPanel">
        <div class="panel-header">
            <span class="panel-header-tag">系统面板</span>
        </div>
        <section>
            <h3>系统控制</h3>
            <div class="panel-actions">
                <button type="button" onclick="clearHistory()">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" style="width:14px;height:14px;vertical-align:middle;margin-right:6px;"><path d="M2 4h12M5.3 4V2.7a.7.7 0 01.7-.7h4a.7.7 0 01.7.7V4m2 0v9.3a.7.7 0 01-.7.7H4a.7.7 0 01-.7-.7V4"/></svg>
                    清除上下文
                </button>
            </div>
            <p id="permissionHint" class="hint" style="display:none;">未能获取麦克风权限，请在浏览器中允许访问。</p>
        </section>
        <section class="sources-section">
            <h3>参考来源</h3>
            <div id="sourcesList" class="sources-list">
                <div class="sources-empty">暂无来源</div>
            </div>
        </section>
        <div class="panel-corner tl"></div>
        <div class="panel-corner tr"></div>
        <div class="panel-corner bl"></div>
        <div class="panel-corner br"></div>
    </aside>

    <div class="wave-strip">
        <div class="wave-label-left">声纹波形</div>
        <div class="wave-label-right" id="recordStatus">正在初始化…</div>
        <canvas id="volumeCanvas" aria-label="实时音量波形"></canvas>
        <div class="wave-glow"></div>
    </div>

    <div class="dialogue-canvas" id="dialogueCanvas"></div>

    <div class="action-bar" id="actionBar">
        <button class="action-btn interrupt-btn" id="interruptBtn" onclick="interrupt()">
            <svg viewBox="0 0 16 16" fill="currentColor" style="width:13px;height:13px;vertical-align:middle;margin-right:4px;"><rect x="3" y="3" width="10" height="10" rx="1.5"/></svg>
            打断回复
        </button>
        <button class="action-btn mode-btn" id="modeBtn" onclick="toggleRecordMode()">持续监听</button>
        <button class="action-btn ptt-btn" id="pttBtn">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><rect x="5" y="1" width="6" height="10" rx="3"/><path d="M3 7a5 5 0 0010 0"/><line x1="8" y1="12" x2="8" y2="15"/><line x1="5" y1="15" x2="11" y2="15"/></svg>
            按住说话
        </button>
    </div>

    <div id="toastStack" class="toast-container"></div>

    <script src="/static/app.js"></script>
    <script>
    // 覆盖波形绘制颜色，适配暗色主题
    (function() {
        const _origPaint = window.paintWave;
        window.paintWave = paintWave;
        function paintWave() {
            if (!volumeCtx || !volumeCanvas) return;
            const width = volumeCanvas.clientWidth;
            const height = volumeCanvas.clientHeight;
            const mid = height / 2;
            volumeCtx.clearRect(0, 0, width, height);
            volumeCtx.beginPath();
            volumeCtx.moveTo(0, mid);
            volumeValues.forEach((val, idx) => {
                const x = (idx / (volumeValues.length - 1)) * width;
                const y = mid + (val - 0.02) * height * 0.8 * (Math.sin(idx / 4) * 0.12 + 1);
                volumeCtx.lineTo(x, y);
            });
            const gradient = volumeCtx.createLinearGradient(0, mid - 30, 0, mid + 30);
            gradient.addColorStop(0, 'rgba(0, 200, 224, 0.25)');
            gradient.addColorStop(0.5, 'rgba(0, 200, 224, 0.7)');
            gradient.addColorStop(1, 'rgba(0, 200, 224, 0.25)');
            volumeCtx.strokeStyle = gradient;
            volumeCtx.lineWidth = 2.5;
            volumeCtx.shadowColor = 'rgba(0, 200, 224, 0.5)';
            volumeCtx.shadowBlur = 8;
            volumeCtx.stroke();
            volumeCtx.shadowBlur = 0;
        }
    })();
    </script>
</body>
</html>
